            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button className="btn btn-primary" onClick={()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`zenspace_backup_${todayStr()}.json`;a.click();URL.revokeObjectURL(url);showToast("Exported!");}} style={{fontSize:".85em"}}>
                ↓ Export Data
              </button>
              <label style={{cursor:"pointer",background:"rgba(255,255,255,.07)",color:scheme.text,padding:"8px 18px",borderRadius:8,fontSize:".85em",fontFamily:"inherit"}}>
                ↑ Import Data
                <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
              </label>
              <button className="btn btn-ghost" onClick={()=>{if(confirm("This will reset ALL your data. Are you sure?")){{update(defaultData);showToast("Data reset");onClose();}}}} style={{fontSize:".85em",color:"#ef4444"}}>
                ⚠ Reset All
              </button>
            </div>
          </SettingSection>
        </div>
      </div>
    </div>
  );
}

function SettingSection({title,children}){
  return(
    <div>
      <div style={{fontSize:".72em",fontWeight:700,color:"var(--muted,#6b6b8a)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:12}}>{title}</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>{children}</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// COMMAND PALETTE
// ═══════════════════════════════════════════════════════
function CommandPalette({data,onClose,setActiveSection,setActiveNotebook,setActivePage,scheme}){
  const[q,setQ]=useState("");
  const inputRef=useRef(null);
  useEffect(()=>{inputRef.current?.focus();},[]);

  const allCmds=[
    {label:"Go to Home",icon:"⌂",action:()=>setActiveSection("home")},
    {label:"Go to Notes",icon:"✦",action:()=>setActiveSection("notes")},
    {label:"Go to To-Do",icon:"✓",action:()=>setActiveSection("todos")},
    {label:"Go to Calendar",icon:"◫",action:()=>setActiveSection("calendar")},
    {label:"Go to Focus Timer",icon:"◎",action:()=>setActiveSection("timer")},
    {label:"Go to Habits",icon:"⬡",action:()=>setActiveSection("habits")},
    {label:"Go to Finance",icon:"◈",action:()=>setActiveSection("finance")},
    {label:"Go to Goals",icon:"◉",action:()=>setActiveSection("goals")},
    {label:"Go to Mood Journal",icon:"◌",action:()=>setActiveSection("mood")},
    {label:"Go to Reading List",icon:"◻",action:()=>setActiveSection("reading")},
    {label:"Go to Flashcards",icon:"◧",action:()=>setActiveSection("flashcards")},
    {label:"Go to Whiteboard",icon:"◪",action:()=>setActiveSection("whiteboard")},
    ...data.notebooks.flatMap(nb=>nb.pages.map(p=>({
      label:`Note: ${p.title}`,icon:"✦",
      action:()=>{setActiveSection("notes");setActiveNotebook(nb.id);setActivePage(p.id);}
    })))
  ];

  const filtered=allCmds.filter(c=>!q||c.label.toLowerCase().includes(q.toLowerCase())).slice(0,10);

  return(
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,.6)",backdropFilter:"blur(8px)",display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:120}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:scheme.surface,border:`1px solid ${scheme.border}`,borderRadius:16,width:"90%",maxWidth:500,overflow:"hidden",color:scheme.text}} className="fade-in">
        <div style={{display:"flex",alignItems:"center",padding:"14px 18px",borderBottom:`1px solid ${scheme.border}`,gap:10}}>
          <span style={{color:scheme.muted}}>⌕</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
            placeholder="Jump to any section or note..."
            style={{flex:1,background:"transparent",border:"none",fontSize:".95em",color:scheme.text}}
            onKeyDown={e=>{
              if(e.key==="Escape")onClose();
              if(e.key==="Enter"&&filtered[0]){filtered[0].action();onClose();}
            }}/>
          <span style={{fontSize:".72em",color:scheme.muted,background:"rgba(255,255,255,.08)",padding:"2px 8px",borderRadius:6}}>ESC</span>
        </div>
        <div style={{maxHeight:320,overflowY:"auto"}}>
          {filtered.map((c,i)=>(
            <button key={i} className="btn" onClick={()=>{c.action();onClose();}}
              style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 18px",textAlign:"left",fontSize:".88em",borderBottom:`1px solid rgba(255,255,255,.03)`,color:scheme.text}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.07)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span style={{color:data.settings.accentColor}}>{c.icon}</span>
              <span>{c.label}</span>
            </button>
          ))}
          {!filtered.length&&<div style={{padding:"20px",textAlign:"center",color:scheme.muted,fontSize:".88em"}}>No results</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
